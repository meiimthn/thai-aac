<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAC ภาษาไทย</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun','Noto Sans Thai',sans-serif;background:#f0f4f8;min-height:100vh}
.app{max-width:900px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh;background:#fff}

/* Header */
.header{background:#1D9E75;color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.header h1{font-size:20px;font-weight:700}
.header-sub{font-size:11px;opacity:0.8}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn-hdr{background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.5);color:#fff;border-radius:10px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-hdr:hover{background:rgba(255,255,255,0.35)}
.voice-toggle{display:flex;background:rgba(0,0,0,0.2);border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.3)}
.voice-toggle button{background:none;border:none;color:rgba(255,255,255,0.7);padding:6px 11px;font-size:12px;font-weight:700;cursor:pointer}
.voice-toggle button.active{background:rgba(255,255,255,0.25);color:#fff}

/* Sentence bar */
.sentence-bar{background:#fff;border-bottom:2px solid #e2e8f0;padding:10px 12px;display:flex;align-items:flex-start;gap:10px;min-height:76px}
.sentence-tokens{display:flex;gap:6px;flex-wrap:wrap;flex:1;align-items:center;min-height:52px}
.sentence-empty{font-size:14px;color:#94a3b8;font-style:italic;align-self:center}
.token-chip{display:flex;align-items:center;gap:5px;background:#f1f5f9;border:1.5px solid #cbd5e1;border-radius:999px;padding:4px 12px 4px 6px;font-size:14px;font-weight:700;color:#1e293b;cursor:pointer;animation:popIn .15s ease}
.token-chip .chip-em{font-size:20px;line-height:1}
.token-chip:hover{background:#fee2e2;border-color:#fca5a5}
@keyframes popIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
.bar-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.btn-speak{background:#1D9E75;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:16px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-speak:hover{background:#0F6E56}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.btn-speak.speaking{animation:pulse 1s ease infinite;background:#0F6E56}
.btn-clear{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:8px 12px;font-size:13px;color:#64748b;cursor:pointer}
.btn-clear:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626}

/* Tabs */
.category-tabs{display:flex;background:#f8fafc;border-bottom:2px solid #e2e8f0;overflow-x:auto;scrollbar-width:none}
.category-tabs::-webkit-scrollbar{display:none}
.cat-tab{display:flex;flex-direction:column;align-items:center;padding:8px 13px;gap:2px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;flex-shrink:0;transition:all .15s}
.cat-tab .te{font-size:18px}
.cat-tab .tl{font-size:10px;color:#64748b;font-weight:600}
.cat-tab.active{border-bottom-color:#1D9E75;background:#fff}
.cat-tab.active .tl{color:#1D9E75}
.cat-tab:hover:not(.active){background:#f1f5f9}

/* Grid */
.grid-area{flex:1;display:flex;flex-direction:column;background:#f8fafc}
.symbol-grid{display:grid;gap:10px;padding:12px;flex:1}

/* Card — emoji style */
.symbol-card{
  background:#fff;border:2.5px solid #e2e8f0;border-radius:16px;
  display:flex;flex-direction:column;cursor:pointer;
  transition:transform .12s,box-shadow .12s;user-select:none;
  position:relative;overflow:hidden;
}
.symbol-card:hover{transform:scale(1.04);box-shadow:0 6px 20px rgba(0,0,0,.13)}
.symbol-card:active{transform:scale(0.96)}

/* Emoji area — fills square */
.card-em{
  width:100%;aspect-ratio:1/1;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden;
}
.card-em span{line-height:1;display:block}

/* Footer */
.card-footer{padding:7px 6px 8px;text-align:center;border-top:1.5px solid #f1f5f9;flex-shrink:0}
.card-thai{font-weight:800;color:#1e293b;line-height:1.3}
.card-sub{color:#94a3b8;margin-top:1px}

/* Color themes */
.color-green .card-em{background:#f0fdf4}.color-green{border-color:#86efac}.color-green .card-footer{background:#f0fdf4}
.color-blue  .card-em{background:#eff6ff}.color-blue {border-color:#93c5fd}.color-blue  .card-footer{background:#eff6ff}
.color-amber .card-em{background:#fffbeb}.color-amber{border-color:#fcd34d}.color-amber .card-footer{background:#fffbeb}
.color-coral .card-em{background:#fef2f2}.color-coral{border-color:#fca5a5}.color-coral .card-footer{background:#fef2f2}
.color-purple.card-em{background:#f5f3ff}.color-purple{border-color:#c4b5fd}.color-purple .card-footer{background:#f5f3ff}
.color-teal  .card-em{background:#f0fdf9}.color-teal {border-color:#5DCAA5}.color-teal  .card-footer{background:#f0fdf9}
.color-pink  .card-em{background:#fdf2f8}.color-pink {border-color:#f9a8d4}.color-pink  .card-footer{background:#fdf2f8}

.custom-badge{position:absolute;top:6px;right:6px;background:#0ea5e9;color:#fff;font-size:9px;font-weight:700;border-radius:5px;padding:2px 5px;z-index:3}
.btn-del-card{position:absolute;top:5px;left:5px;background:rgba(220,38,38,.85);border:none;color:#fff;border-radius:6px;width:22px;height:22px;font-size:13px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:3}
.symbol-card:hover .btn-del-card{display:flex}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 14px;background:#fff;border-top:1px solid #e2e8f0;flex-wrap:wrap}
.pg-nav{display:flex;align-items:center;gap:8px}
.pg-btn{background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:10px;padding:7px 14px;font-size:14px;cursor:pointer;font-weight:700;color:#475569}
.pg-btn:hover:not(:disabled){background:#e2e8f0}
.pg-btn:disabled{opacity:.35;cursor:default}
.pg-info{font-size:13px;font-weight:600;color:#64748b;min-width:60px;text-align:center}
.scale-ctrl{display:flex;align-items:center;gap:6px;font-size:12px;color:#64748b;font-weight:600}
.scale-ctrl .sc-lbl{min-width:58px;text-align:center;font-weight:700;color:#1D9E75;font-size:13px}
.scale-btn{background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:8px;width:30px;height:30px;font-size:18px;cursor:pointer;font-weight:700;color:#475569;display:flex;align-items:center;justify-content:center;line-height:1}
.scale-btn:hover:not(:disabled){background:#d1fae5;border-color:#6ee7b7;color:#1D9E75}
.scale-btn:disabled{opacity:.35;cursor:default}

/* Settings */
.settings-row{display:flex;align-items:center;gap:10px;padding:8px 14px;background:#fff;border-top:2px solid #e2e8f0;font-size:13px;color:#475569;flex-wrap:wrap}
.settings-row label{display:flex;align-items:center;gap:5px;font-weight:600}
.settings-row select{font-size:13px;padding:4px 8px;border-radius:8px;border:1.5px solid #cbd5e1;background:#f8fafc;color:#1e293b;cursor:pointer}
.s-btn{background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;color:#475569}
.s-btn:hover{background:#e2e8f0}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:#fff;border-radius:999px;padding:10px 22px;font-size:14px;font-weight:600;transition:transform .3s ease;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:22px;width:360px;max-width:95vw;display:flex;flex-direction:column;gap:13px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:17px;font-weight:700;color:#1e293b}
.modal label{font-size:13px;font-weight:600;color:#475569;display:block;margin-bottom:4px}
.modal input,.modal select{width:100%;border:1.5px solid #cbd5e1;border-radius:9px;padding:8px 10px;font-size:14px;font-family:inherit;color:#1e293b;background:#f8fafc}
.modal input:focus,.modal select:focus{outline:none;border-color:#1D9E75}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;max-height:140px;overflow-y:auto;border:1.5px solid #e2e8f0;border-radius:9px;padding:5px;background:#f8fafc}
.emoji-opt{font-size:22px;cursor:pointer;text-align:center;padding:3px;border-radius:6px}
.emoji-opt:hover{background:#e2e8f0}
.emoji-opt.sel{background:#d1fae5;outline:2px solid #1D9E75}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:9px;padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer;color:#64748b}
.btn-save{background:#1D9E75;color:#fff;border:none;border-radius:9px;padding:8px 18px;font-size:14px;font-weight:700;cursor:pointer}
.img-prev{width:60px;height:60px;object-fit:contain;border-radius:10px;border:1.5px solid #e2e8f0;display:none}
.img-prev.show{display:block}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div><h1>🗣️ AAC ภาษาไทย</h1><div class="header-sub">กดสัญลักษณ์ → สร้างประโยค → กด พูด</div></div>
    <div class="header-right">
      <div class="voice-toggle">
        <button id="btnMale" class="active" onclick="setGender('male')">👨 ชาย</button>
        <button id="btnFemale" onclick="setGender('female')">👩 หญิง</button>
      </div>
      <button class="btn-hdr" onclick="openModal()">➕ เพิ่มคำ</button>
    </div>
  </div>

  <div class="sentence-bar">
    <div class="sentence-tokens" id="sentenceTokens">
      <span class="sentence-empty">กดที่สัญลักษณ์เพื่อสร้างประโยค...</span>
    </div>
    <div class="bar-actions">
      <button class="btn-speak" id="btnSpeak" onclick="speakSentence()">🔊 พูด</button>
      <button class="btn-clear" onclick="clearSentence()">🗑️ ลบ</button>
    </div>
  </div>

  <div class="category-tabs" id="categoryTabs"></div>

  <div class="grid-area">
    <div class="symbol-grid" id="symbolGrid"></div>
    <div class="pagination">
      <div class="scale-ctrl">
        <button class="scale-btn" id="scaleDown" onclick="changeScale(-1)">−</button>
        <span class="sc-lbl" id="scaleLabel">4/หน้า</span>
        <button class="scale-btn" id="scaleUp" onclick="changeScale(1)">+</button>
      </div>
      <div class="pg-nav">
        <button class="pg-btn" id="pgPrev" onclick="changePage(-1)">◀</button>
        <span class="pg-info" id="pgInfo">1 / 1</span>
        <button class="pg-btn" id="pgNext" onclick="changePage(1)">▶</button>
      </div>
    </div>
  </div>

  <div class="settings-row">
    ⚙️
    <label>ความเร็ว
      <select id="rateSelect">
        <option value="0.5">ช้ามาก</option>
        <option value="0.75">ช้า</option>
        <option value="1" selected>ปกติ</option>
        <option value="1.3">เร็ว</option>
      </select>
    </label>
    <label>เสียง <select id="voiceSelect"><option value="">อัตโนมัติ</option></select></label>
    <button class="s-btn" onclick="testTTS()">🔔 ทดสอบเสียง</button>
    <span id="ttsStatus" style="font-size:12px;color:#94a3b8"></span>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>➕ เพิ่มคำศัพท์ใหม่</h2>
    <div><label>หมวดหมู่</label><select id="newCat"></select></div>
    <div><label>คำภาษาไทย *</label><input type="text" id="newThai" placeholder="เช่น มะม่วง" maxlength="20"></div>
    <div><label>คำภาษาอังกฤษ</label><input type="text" id="newSub" placeholder="เช่น mango" maxlength="20"></div>
    <div>
      <label>เลือก Emoji *</label>
      <div class="emoji-grid" id="emojiGrid"></div>
      <div style="margin-top:5px;font-size:13px;color:#64748b">เลือกแล้ว: <span id="selEmojiShow" style="font-size:22px">—</span></div>
    </div>
    <div>
      <label>หรืออัพโหลดรูปภาพ (แทน Emoji)</label>
      <div style="display:flex;align-items:center;gap:10px">
        <input type="file" id="imgUpload" accept="image/*" style="font-size:12px">
        <img id="imgPrev" class="img-prev" src="" alt="">
      </div>
    </div>
    <div><label>สีกรอบ</label>
      <select id="newColor">
        <option value="amber">🟡 เหลือง (อาหาร)</option>
        <option value="green">🟢 เขียว (ผัก)</option>
        <option value="blue">🔵 น้ำเงิน (เครื่องดื่ม)</option>
        <option value="coral">🔴 แดง (ด่วน)</option>
        <option value="purple">🟣 ม่วง (ความรู้สึก)</option>
        <option value="teal">🩵 มิ้นท์ (กิจกรรม)</option>
        <option value="pink">🌸 ชมพู (ขนม)</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn-save" onclick="saveNewWord()">💾 บันทึก</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

  if(!SYMBOLS[w.catId])SYMBOLS[w.catId]=[];
  SYMBOLS[w.catId].push(w);
  if(w.catId!=='custom')SYMBOLS.custom.push({...w});
});

function gridCols(n){return n<=1?1:n<=2?2:n<=4?2:n<=6?3:4;}

// Emoji font size: fills ~85% of card width
// card width ≈ (gridArea_width - gaps) / cols
function calcEmSize(){
  const grid = document.getElementById('symbolGrid');
  const cols = gridCols(perPage);
  const gap = 10;
  const pad = 24; // 12px each side
  const gridW = grid.offsetWidth || 600;
  const cardW = (gridW - pad - gap*(cols-1)) / cols;
  // emoji fills 85% of cardW, but cap reasonably
  const px = Math.floor(cardW * 0.75);
  return Math.min(px, 160) + 'px';
}
function textSize(n){
  if(n<=4)return{thai:'16px',sub:'11px'};
  if(n<=9)return{thai:'13px',sub:'10px'};
  return{thai:'11px',sub:'9px'};
}

// ── TTS ────────────────────────────────────────────────────
function initTTS(){
  if(!window.speechSynthesis){document.getElementById('ttsStatus').textContent='❌ ไม่รองรับ TTS';return;}
  function load(){
    voices=window.speechSynthesis.getVoices();
    const thV=voices.filter(v=>v.lang&&v.lang.toLowerCase().startsWith('th'));
    const sel=document.getElementById('voiceSelect');
    sel.innerHTML='<option value="">อัตโนมัติ</option>';
    thV.forEach(v=>{const o=document.createElement('option');o.value=v.name;o.textContent=v.name;sel.appendChild(o);});
    const st=document.getElementById('ttsStatus');
    if(thV.length){st.textContent='✅ เสียงไทย '+thV.length+' เสียง';st.style.color='#059669';}
    else{st.textContent='⚠️ ไม่พบเสียงไทย';st.style.color='#d97706';}
  }
  if(window.speechSynthesis.onvoiceschanged!==undefined)window.speechSynthesis.onvoiceschanged=load;
  [100,600,1500].forEach(t=>setTimeout(load,t));
}
function pickVoice(){
  const m=document.getElementById('voiceSelect').value;
  if(m){const v=voices.find(v=>v.name===m);if(v)return v;}
  const thV=voices.filter(v=>v.lang&&v.lang.toLowerCase().startsWith('th'));
  if(!thV.length)return voices[0]||null;
  if(genderPref==='male'){const mv=thV.find(v=>/male|man|david|mark|ณัฐพล|ชาย/i.test(v.name));return mv||thV[thV.length-1];}
  const fv=thV.find(v=>/female|woman|samantha|zira|karen|สุภาพ|หญิง/i.test(v.name));return fv||thV[0];
}
function doSpeak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  setTimeout(()=>{
    const u=new SpeechSynthesisUtterance(text);
    u.lang='th-TH';u.rate=parseFloat(document.getElementById('rateSelect').value);
    u.pitch=genderPref==='male'?0.5:1.3;
    const v=pickVoice();if(v)u.voice=v;
    window.speechSynthesis.speak(u);
  },80);
}
function speakSentence(){
  if(!sentence.length){showToast('กรุณาเลือกสัญลักษณ์ก่อน');return;}
  const text=sentence.map(s=>s.t).join(' ');
  const btn=document.getElementById('btnSpeak');
  btn.classList.add('speaking');btn.textContent='⏹ กำลังพูด...';
  window.speechSynthesis.cancel();
  setTimeout(()=>{
    const u=new SpeechSynthesisUtterance(text);
    u.lang='th-TH';u.rate=parseFloat(document.getElementById('rateSelect').value)*0.9;
    u.pitch=genderPref==='male'?0.5:1.3;
    const v=pickVoice();if(v)u.voice=v;
    u.onend=u.onerror=()=>{btn.classList.remove('speaking');btn.innerHTML='🔊 พูด';};
    window.speechSynthesis.speak(u);
  },80);
}
function testTTS(){doSpeak(genderPref==='male'?'สวัสดีครับ':'สวัสดีค่ะ');showToast('ทดสอบเสียง...');}
function setGender(g){
  genderPref=g;
  document.getElementById('btnMale').classList.toggle('active',g==='male');
  document.getElementById('btnFemale').classList.toggle('active',g==='female');
  doSpeak(g==='male'?'สวัสดีครับ':'สวัสดีค่ะ');
}

// ── UI ─────────────────────────────────────────────────────
function buildTabs(){
  const tabs=document.getElementById('categoryTabs');tabs.innerHTML='';
  CATEGORIES.forEach(cat=>{
    const el=document.createElement('div');
    el.className='cat-tab'+(cat.id===currentCat?' active':'');
    el.innerHTML=`<span class="te">${cat.emoji}</span><span class="tl">${cat.label}</span>`;
    el.onclick=()=>{currentCat=cat.id;currentPage=0;buildTabs();buildGrid();};
    tabs.appendChild(el);
  });
}

function buildGrid(){
  const grid=document.getElementById('symbolGrid');grid.innerHTML='';
  const syms=SYMBOLS[currentCat]||[];
  const cols=gridCols(perPage);
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;

  if(!syms.length&&currentCat==='custom'){
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#94a3b8;font-size:15px">ยังไม่มีคำ<br>กด <strong>➕ เพิ่มคำ</strong> ได้เลย!</div>';
    updatePagination(0);return;
  }
  const total=Math.ceil(syms.length/perPage)||1;
  if(currentPage>=total)currentPage=total-1;
  const slice=syms.slice(currentPage*perPage,(currentPage+1)*perPage);
  const em=calcEmSize();
  const ts=textSize(perPage);

  slice.forEach((sym,idx)=>{
    const realIdx=currentPage*perPage+idx;
    const card=document.createElement('div');
    card.className=`symbol-card color-${sym.c||'teal'}`;

    // Image area
    let imgHtml='';
    if(sym.imgData){
      imgHtml=`<div class="card-em"><img src="${sym.imgData}" style="width:70%;height:70%;object-fit:contain"></div>`;
    } else {
      imgHtml=`<div class="card-em"><span style="font-size:${em}">${sym.e}</span></div>`;
    }

    const badge=sym.isCustom?'<span class="custom-badge">ฉัน</span>':'';
    const del=sym.isCustom?`<button class="btn-del-card" onclick="delWord(event,${realIdx})">✕</button>`:'';

    card.innerHTML=`${badge}${del}${imgHtml}
      <div class="card-footer">
        <div class="card-thai" style="font-size:${ts.thai}">${sym.t}</div>
        <div class="card-sub" style="font-size:${ts.sub}">${sym.s||''}</div>
      </div>`;
    card.onclick=(e)=>{if(!e.target.classList.contains('btn-del-card'))addToken(sym);};
    grid.appendChild(card);
  });
  updatePagination(total);
}

function updatePagination(total){
  const t=Math.max(1,total);
  document.getElementById('pgInfo').textContent=(currentPage+1)+' / '+t;
  document.getElementById('pgPrev').disabled=currentPage===0;
  document.getElementById('pgNext').disabled=currentPage>=t-1;
  document.getElementById('scaleLabel').textContent=perPage+'/หน้า';
  document.getElementById('scaleDown').disabled=perPageIdx===0;
  document.getElementById('scaleUp').disabled=perPageIdx===PER_PAGE.length-1;
}
function changePage(d){const total=Math.ceil((SYMBOLS[currentCat]||[]).length/perPage)||1;currentPage=Math.max(0,Math.min(total-1,currentPage+d));buildGrid();}
function changeScale(d){const ni=perPageIdx+d;if(ni<0||ni>=PER_PAGE.length)return;perPageIdx=ni;perPage=PER_PAGE[perPageIdx];currentPage=0;buildGrid();}

function addToken(sym){
  sentence.push(sym);renderSentence();doSpeak(sym.t);
}
function renderSentence(){
  const c=document.getElementById('sentenceTokens');c.innerHTML='';
  if(!sentence.length){c.innerHTML='<span class="sentence-empty">กดที่สัญลักษณ์เพื่อสร้างประโยค...</span>';return;}
  sentence.forEach((sym,i)=>{
    const chip=document.createElement('div');chip.className='token-chip';chip.title='กดเพื่อลบ';
    const img=sym.imgData?`<img src="${sym.imgData}" style="width:22px;height:22px;object-fit:contain">`:
              `<span class="chip-em">${sym.e}</span>`;
    chip.innerHTML=`${img}<span>${sym.t}</span>`;
    chip.onclick=()=>{sentence.splice(i,1);renderSentence();};
    c.appendChild(chip);
  });
}
function clearSentence(){sentence=[];renderSentence();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

// ── MODAL ──────────────────────────────────────────────────
function openModal(){
  const sel=document.getElementById('newCat');sel.innerHTML='';
  CATEGORIES.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.emoji+' '+c.label;if(c.id===currentCat)o.selected=true;sel.appendChild(o);});
  const eg=document.getElementById('emojiGrid');eg.innerHTML='';
  EMOJI_POOL.forEach(em=>{
    const d=document.createElement('div');d.className='emoji-opt';d.textContent=em;
    d.onclick=()=>{document.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');selEmoji=em;document.getElementById('selEmojiShow').textContent=em;uploadedImg='';document.getElementById('imgPrev').classList.remove('show');};
    eg.appendChild(d);
  });
  selEmoji='';uploadedImg='';
  ['newThai','newSub'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('imgUpload').value='';
  document.getElementById('imgPrev').classList.remove('show');
  document.getElementById('selEmojiShow').textContent='—';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('imgUpload').addEventListener('change',function(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{uploadedImg=ev.target.result;const p=document.getElementById('imgPrev');p.src=uploadedImg;p.classList.add('show');selEmoji='';document.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('sel'));document.getElementById('selEmojiShow').textContent='(รูป)';};
  r.readAsDataURL(file);
});
function saveNewWord(){
  const thai=document.getElementById('newThai').value.trim();
  if(!thai){showToast('กรุณาใส่คำภาษาไทย');return;}
  if(!selEmoji&&!uploadedImg){showToast('กรุณาเลือก Emoji หรืออัพโหลดรูป');return;}
  const catId=document.getElementById('newCat').value;
  const w={e:selEmoji||'⭐',imgData:uploadedImg||undefined,t:thai,s:document.getElementById('newSub').value.trim(),c:document.getElementById('newColor').value,isCustom:true,catId};
  if(!SYMBOLS[catId])SYMBOLS[catId]=[];SYMBOLS[catId].push(w);
  if(catId!=='custom')SYMBOLS.custom.push({...w});
  customWords.push(w);
  try{localStorage.setItem('aac_custom',JSON.stringify(customWords));}catch(e){}
  closeModal();currentCat=catId;currentPage=Math.floor((SYMBOLS[catId].length-1)/perPage);
  buildTabs();buildGrid();showToast('✅ เพิ่ม "'+thai+'" แล้ว!');
}
function delWord(e,idx){
  e.stopPropagation();const word=SYMBOLS[currentCat][idx];
  if(!confirm('ลบ "'+word.t+'" ออก?'))return;
  SYMBOLS[currentCat].splice(idx,1);
  customWords=customWords.filter(w=>!(w.t===word.t&&w.catId===currentCat));
  try{localStorage.setItem('aac_custom',JSON.stringify(customWords));}catch(e){}
  if(currentPage>0&&currentPage*perPage>=SYMBOLS[currentCat].length)currentPage--;
  buildGrid();showToast('ลบ "'+word.t+'" แล้ว');
}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

initTTS();buildTabs();
// Wait for layout then build grid so calcEmSize gets real widths
requestAnimationFrame(()=>requestAnimationFrame(buildGrid));
window.addEventListener('resize', ()=>buildGrid());
</script>
</body>
</html>
